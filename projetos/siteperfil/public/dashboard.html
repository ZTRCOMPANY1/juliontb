<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - GamerProfile</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="container">
    <div class="topbar">
      <h1>Seu Dashboard</h1>
      <a class="btn" href="/">Início</a>
    </div>

    <div class="card dashboard-header">
      <img id="avatar" class="avatar" src="" alt="Avatar">
      <div>
        <div id="username" class="username"></div>
        <div id="level" class="level"></div>
        <div id="profileLink" class="link-box"></div>
      </div>
    </div>

    <div class="grid">
      <div class="card">
        <h2>Jogos jogados</h2>
        <div id="games" class="list"></div>
      </div>

      <div class="card">
        <h2>Conquistas</h2>
        <div id="achievements" class="list"></div>
      </div>

      <div class="card">
        <h2>Badges</h2>
        <div id="badges" class="list"></div>
      </div>

      <div class="card">
        <h2>Estatísticas</h2>
        <div id="stats" class="stats"></div>
      </div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
