<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LOVEFLIX</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-left">
      <a href="index.html" class="brand">LOVEFLIX</a>
      <nav class="nav">
        <a href="index.html" class="active">Início</a>
        <a href="historia.html">Nossa História</a>
      </nav>
    </div>
    <div class="topbar-right">
      <button id="logoutBtn" class="logout-btn">Sair</button>
    </div>
  </header>

  <section class="hero">
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <p class="hero-tag">Série exclusiva</p>
      <h1>Nossa História</h1>
      <p class="hero-text">
        Uma história feita de momentos, memórias, fotos, vídeos e muito amor.
        Cada capítulo guarda um pedacinho da nossa caminhada juntos.
      </p>
      <div class="hero-buttons">
        <a href="historia.html" class="btn btn-primary">Ver nossa história</a>
        <a href="#linha-do-tempo" class="btn btn-secondary">Explorar momentos</a>
      </div>
    </div>
  </section>

  <main class="content">
    <section class="row-section" id="linha-do-tempo">
      <h2>Capítulos da nossa história</h2>
      <div class="scroll-row" id="homeRow"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
