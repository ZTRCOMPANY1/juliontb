<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin - Usuários</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body class="app-body">
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>
  <div class="bg-grid"></div>

  <header class="topbar glass">
    <div class="brand">
      <div class="brand-logo">👥</div>
      <div>
        <h1>Gerenciar Usuários</h1>
        <p>Resetar pontos, bloquear e remover do sistema</p>
      </div>
    </div>

    <nav class="topbar-actions">
      <a href="admin.html" class="ghost-btn link-btn">Perguntas</a>
      <a href="index.html" class="ghost-btn link-btn">Início</a>
      <button id="logoutBtn" class="danger-btn">Sair</button>
    </nav>
  </header>

  <main class="container">
    <section class="hero-banner glass">
      <div class="hero-copy">
        <span class="pill">Usuários do sistema</span>
        <h2>Gerencie contas do app</h2>
        <p>Você pode resetar pontuação, bloquear/desbloquear e remover do app. Isso não apaga a conta do Firebase Auth de verdade.</p>
      </div>
    </section>

    <section class="admin-card glass">
      <div class="section-head-row">
        <div>
          <span class="pill">Lista de usuários</span>
          <h3>Contas cadastradas</h3>
        </div>
      </div>

      <div id="usersList" class="admin-movie-list"></div>
    </section>
  </main>

  <div id="toast" class="toast hidden"></div>

  <script type="module" src="firebase-config.js"></script>
  <script type="module" src="admin-users.js"></script>
</body>
</html>
