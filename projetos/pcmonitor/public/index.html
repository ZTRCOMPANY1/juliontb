<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PC Monitor V2</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="topbar">
    <div>
      <h1>PC Monitor V2</h1>
      <p>Painel das máquinas</p>
    </div>
    <div class="topbar-actions">
      <button id="themeToggle">Tema</button>
      <button id="logoutBtn">Sair</button>
    </div>
  </div>

  <div class="page-wrap">
    <div class="card">
      <div class="card-head">
        <h2>Máquinas</h2>
        <span id="machineCount">0</span>
      </div>
      <div id="machinesGrid" class="machines-grid"></div>
    </div>
  </div>

  <script src="https://SEU-BACKEND.onrender.com/socket.io/socket.io.js"></script>
  <script src="app.js"></script>
</body>
</html>
