<meta charset="UTF-8">

<title>Nosso Álbum 2</title>

<style>

body{
margin:0;
background:linear-gradient(135deg,#ff6a88,#ff99ac);
font-family:Arial;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
min-height:100vh;
color:white;
overflow-x:hidden;
}

/* LIVRO */

.book{

width:90%;
max-width:800px;
height:500px;
position:relative;
perspective:3000px;

}

/* PAGINAS */

.page{

position:absolute;
width:100%;
height:100%;
top:0;
left:0;

transform-style:preserve-3d;
transform-origin:left;

transition:transform 1.2s;

border-radius:10px;
overflow:hidden;

box-shadow:0 15px 35px rgba(0,0,0,0.4);

background:white;

}

/* FRENTE DA PAGINA */

.front{

position:absolute;
width:100%;
height:100%;
backface-visibility:hidden;

}

/* VERSO DA PAGINA */

.back{

position:absolute;
width:100%;
height:100%;

transform:rotateY(180deg);

backface-visibility:hidden;

}

/* IMAGENS */

.page img{

width:100%;
height:100%;
object-fit:cover;

}

/* VIRAR PAGINA */

.page.flipped{

transform:rotateY(-180deg);

}

/* CONTROLES */

.controls{

margin-top:30px;
display:flex;
gap:20px;

}

button{

padding:12px 25px;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;

background:white;
color:#ff4f81;
font-weight:bold;

}

/* CORAÇÕES */

.heart{

position:fixed;
font-size:20px;
color:#ff4f81;
animation:fall 3s linear forwards;

}

@keyframes fall{

0%{
transform:translateY(-50px);
opacity:1;
}

100%{
transform:translateY(100vh);
opacity:0;
}

}

</style>

</head>

<div style="position:fixed;bottom:20px;right:20px;background:rgba(0,0,0,0.6);padding:10px;border-radius:10px">

<button id="muteBtn">🔊</button>

<input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.5">

</div>

<script>

/* PAGINAS */

const pages = document.querySelectorAll(".page")

let currentPage = 0

/* ORGANIZA ZINDEX */

pages.forEach((page,i)=>{

page.style.zIndex = pages.length - i

})

/* PROXIMA PAGINA */

function nextPage(){

if(currentPage < pages.length){

pages[currentPage].classList.add("flipped")

currentPage++

spawnHearts()

}

}

/* PAGINA ANTERIOR */

function prevPage(){

if(currentPage > 0){

currentPage--

pages[currentPage].classList.remove("flipped")

spawnHearts()

}

}

/* CORAÇÕES */

function spawnHearts(){

for(let i=0;i<15;i++){

const heart = document.createElement("div")

heart.className="heart"
heart.innerHTML="💗"

heart.style.left = Math.random()*100+"vw"
heart.style.fontSize = (Math.random()*20+10)+"px"

document.body.appendChild(heart)

setTimeout(()=>{

heart.remove()

},3000)

}

}

/* MUSICA */

const musica = document.getElementById("musica")
const muteBtn = document.getElementById("muteBtn")
const volumeSlider = document.getElementById("volumeSlider")

musica.volume = 0.5

muteBtn.onclick = () => {

musica.muted = !musica.muted
muteBtn.innerText = musica.muted ? "🔇" : "🔊"

}

volumeSlider.oninput = () => {

musica.volume = volumeSlider.value

}

</script>
