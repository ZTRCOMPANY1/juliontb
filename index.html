<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel Privado</title>

<style>
body {
  background: #0f172a;
  color: white;
  font-family: Arial;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
}

.box {
  background: #1e293b;
  padding: 30px;
  border-radius: 15px;
  text-align: center;
}
</style>

<script>
// 🚫 Bloquear F12 (básico)
document.addEventListener('keydown', function(e) {
  if (e.key === "F12") e.preventDefault();
  if (e.ctrlKey && e.shiftKey && e.key === "I") e.preventDefault();
  if (e.ctrlKey && e.key === "U") e.preventDefault();
});

// 🚫 bloquear clique direito
document.addEventListener('contextmenu', e => e.preventDefault());

// LOGIN
async function login() {
  const senhaInput = document.getElementById("senha").value;

  try {
    const res = await fetch("https://raw.githubusercontent.com/ZTRCOMPANY1/codigoacessojuliontb/main/auth.json");
    const data = await res.json();

    if (senhaInput === data.password) {
      document.body.innerHTML = `
        <h1>Acesso liberado</h1>
        <a href="https://link.juliontb.site">link.juliontb.site</a>
      `;
    } else {
      alert("Senha incorreta");
    }

  } catch (erro) {
    alert("Erro ao conectar com o servidor");
    console.error(erro);
  }
}
</script>

</head>
<body>

<div class="box">
  <h2>Login</h2>
  <input type="password" id="senha" placeholder="Senha"><br><br>
  <button onclick="login()">Entrar</button>
</div>

</body>
</html>
