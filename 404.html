<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redirecionando...</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #09090f;
      color: white;
      font-family: Arial, Helvetica, sans-serif;
      padding: 20px;
      text-align: center;
    }

    .box {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 18px;
      padding: 24px;
      max-width: 650px;
      width: 100%;
    }

    h1 { margin-top: 0; }
    p { color: #c9d1e8; line-height: 1.6; }
    a { color: #a78bfa; }
  </style>
</head>
<body>
  <div class="box">
    <h1>Carregando...</h1>
    <p id="status">Verificando rota.</p>
  </div>

  <script type="module">
    const statusEl = document.getElementById("status");
    const path = window.location.pathname;
    const parts = path.split("/").filter(Boolean);

    function go(url) {
      window.location.replace(url);
    }

    async function handleRoute() {
      if (!parts.length) {
        statusEl.innerHTML = `Página não encontrada.<br><br><a href="/">Ir para início</a>`;
        return;
      }

      const project = parts[0];

      // 1) ENCURTADOR
      if (project === "encurtador") {
        const slug = parts[1];

        if (!slug) {
          go("/encurtador/");
          return;
        }

        statusEl.textContent = "Buscando link curto...";

        try {
          const { initializeApp } = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js");
          const { getFirestore, doc, getDoc, updateDoc } = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js");

          const firebaseConfig = {
      apiKey: "AIzaSyD-Oiz4RXEY4yW6_A3xuLOmsv3mw3urZDU",
      authDomain: "encurta-67ddd.firebaseapp.com",
      projectId: "encurta-67ddd",
      storageBucket: "encurta-67ddd.firebasestorage.app",
      messagingSenderId: "497432750979",
      appId: "1:497432750979:web:5454503ebdbf6ac30424b6"
          };

          const app = initializeApp(firebaseConfig);
          const db = getFirestore(app);

          const ref = doc(db, "short_links", slug);
          const snap = await getDoc(ref);

          if (!snap.exists()) {
            statusEl.innerHTML = `
              Link curto não existe.<br><br>
              <a href="/encurtador/">Voltar ao encurtador</a>
            `;
            return;
          }

          const data = snap.data();

          await updateDoc(ref, {
            clicks: (data.clicks || 0) + 1,
            lastClick: new Date().toISOString()
          });

          go(data.url);
          return;
        } catch (err) {
          console.error(err);
          statusEl.innerHTML = `
            Erro ao abrir link curto.<br><br>
            <a href="/encurtador/">Voltar ao encurtador</a>
          `;
          return;
        }
      }

      // 2) LINKHUB
    (function () {
      const parts = window.location.pathname.split("/").filter(Boolean);

      // /linkhub/user/slug
      if (parts.length >= 3 && parts[0] === "linkhub" && parts[1] === "user") {
        const slug = parts[2];
        window.location.replace("/linkhub/user.html?slug=" + encodeURIComponent(slug));
      } else {
        window.location.replace("/linkhub/");
      }
    })();

      // 3) ALBUM
      if (project === "album") {
        go("/album/");
        return;
      }

      // 4) DASHBOARD
      if (project === "dashboard") {
        go("/dashboard/");
        return;
      }

      // 5) FALLBACK GERAL
      statusEl.innerHTML = `
        Página não encontrada.<br><br>
        <a href="/">Ir para início</a>
      `;
    }

    handleRoute();
  </script>
</body>
</html>
