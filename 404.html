<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Redirecionando...</title>
  <script>
    (function () {
      const path = window.location.pathname.split("/").filter(Boolean);

      if (path.length >= 3 && path[0] === "linkhub" && path[1] === "user") {
        const slug = path[2];
        window.location.replace("/linkhub/user.html?slug=" + encodeURIComponent(slug));
        return;
      }

      window.location.replace("/linkhub/");
    })();
  </script>
</head>
<body>
  Redirecionando...
</body>
</html>
