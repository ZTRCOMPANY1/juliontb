<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Encurtador</title>
  <link rel="stylesheet" href="../style.css" />
</head>
<body>
  <main class="auth-page">
    <section class="auth-card">
      <p class="eyebrow">juliontb.site</p>
      <h1>Entrar</h1>
      <p class="auth-subtitle">Acesse sua conta para ver apenas os seus links.</p>

      <div class="field">
        <label for="loginEmail">E-mail</label>
        <input id="loginEmail" type="email" placeholder="seuemail@gmail.com" />
      </div>

      <div class="field">
        <label for="loginPassword">Senha</label>
        <input id="loginPassword" type="password" placeholder="Sua senha" />
      </div>

      <button id="loginBtn" class="btn primary">Entrar</button>

      <div id="authMessage" class="message hidden"></div>

      <p class="auth-switch">
        Não tem conta?
        <a href="../register/index.html">Criar conta</a>
      </p>
    </section>
  </main>

  <script type="module" src="../auth.js"></script>
</body>
</html>
