<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Encurtador de Links</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>

  <main class="container">
    <header class="hero">
      <div>
        <p class="eyebrow">juliontb.site</p>
        <h1>Encurtador de Links</h1>
        <p class="subtitle">
          Crie links curtos, veja estatísticas de cliques e gere QR code automaticamente.
        </p>
      </div>
    </header>

    <section class="card">
      <h2>Criar novo link</h2>

      <div class="form-grid">
        <div class="field">
          <label for="originalUrl">URL original</label>
          <input
            id="originalUrl"
            type="url"
            placeholder="https://exemplo.com/pagina/muito/grande"
          />
        </div>

        <div class="field">
          <label for="customSlug">Slug personalizado (opcional)</label>
          <input
            id="customSlug"
            type="text"
            placeholder="meulink"
            maxlength="40"
          />
        </div>
      </div>

      <div class="actions">
        <button id="createBtn" class="btn primary">Encurtar URL</button>
        <button id="clearBtn" class="btn ghost" type="button">Limpar</button>
      </div>

      <div id="message" class="message hidden"></div>
    </section>

    <section id="resultCard" class="card hidden">
      <h2>Link criado</h2>

      <div class="result-box">
        <div class="field">
          <label>Link curto</label>
          <input id="shortUrlOutput" type="text" readonly />
        </div>

        <div class="actions wrap">
          <button id="copyBtn" class="btn primary">Copiar link</button>
          <button id="downloadQrBtn" class="btn ghost">Baixar QR Code</button>
        </div>
      </div>

      <div class="qr-area">
        <div id="qrcode"></div>
      </div>
    </section>

    <section class="card">
      <div class="card-head">
        <h2>Seus links</h2>
        <button id="refreshBtn" class="btn ghost">Atualizar</button>
      </div>

      <div class="field">
        <label for="searchInput">Buscar por slug ou URL</label>
        <input id="searchInput" type="text" placeholder="Buscar..." />
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Slug</th>
              <th>Destino</th>
              <th>Cliques</th>
              <th>Último clique</th>
              <th>Criado em</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="linksTableBody">
            <tr>
              <td colspan="6" class="empty-state">Carregando links...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
  <script type="module" src="./app.js"></script>
</body>
</html>
